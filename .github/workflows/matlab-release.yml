name: MATLAB Binary Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "matlab-*"

permissions:
  contents: read

jobs:
  native:
    name: Build MATLAB FFI binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build FFI library
        shell: bash
        run: |
          cargo build --lib --no-default-features --features ffi

      - name: Stage release artifacts
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/debug/interlib.dll dist/ 2>/dev/null || true
          elif [ "${{ runner.os }}" = "macOS" ]; then
            cp target/debug/libinterlib.dylib dist/ 2>/dev/null || true
          else
            cp target/debug/libinterlib.so dist/ 2>/dev/null || true
          fi
          cp matlab/README.md dist/README-matlab.md
          cp matlab/headers/interlib_native.h dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: matlab-binary-${{ runner.os }}
          path: dist
